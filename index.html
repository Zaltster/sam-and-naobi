<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naobi &amp; Sam</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: #f2a9bd; font-family: Georgia, "Times New Roman", serif; }
    canvas { display: block; width: 100%; height: 100%; }

    .message {
      position: fixed;
      top: clamp(24px, 6vh, 70px);
      left: 50%;
      width: 100%;
      padding: 0 20px;
      text-align: center;
      color: #fff;
      opacity: 0;
      transform: translate(-50%, 18px) scale(.96);
      text-shadow: 0 3px 26px rgba(123, 31, 63, .5);
      transition: opacity 1.3s ease, transform 1.3s ease;
      pointer-events: none;
      z-index: 2;
    }
    .message.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
    .message small {
      display: block; margin-bottom: 6px;
      font-size: clamp(12px, 1.7vw, 19px);
      font-style: italic; letter-spacing: .18em;
    }
    .message h1 {
      margin: 0; font-weight: normal;
      font-size: clamp(38px, 7vw, 80px); letter-spacing: .035em;
    }
    .message .heart { color: #fff0f4; display: inline-block; animation: beat 1.25s ease-in-out infinite; }
    .message .date {
      margin: 8px 0 0;
      font-size: clamp(13px, 1.9vw, 22px);
      font-style: italic;
      letter-spacing: .12em;
      color: #fff;
      opacity: .92;
    }
    @keyframes beat { 50% { transform: scale(1.18); } }

    button {
      position: fixed; right: 18px; bottom: 18px;
      padding: 10px 17px;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: 99px;
      background: rgba(114, 30, 60, .2);
      color: #fff; font: 15px Georgia, serif; cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background .2s ease, transform .2s ease;
      z-index: 3;
    }
    button:hover { background: rgba(114, 30, 60, .34); transform: translateY(-2px); }
  </style>
</head>
<body>
  <canvas id="canvas" aria-label="Two fluffy rabbits, Naobi and Sam, kiss and their ears form a heart"></canvas>

  <div class="message" id="message">
    <small>our love will exist forever</small>
    <h1>Naobi <span class="heart">&#9829;</span> Sam</h1>
    <p class="date">September 7th &mdash; forever</p>
  </div>

  <button id="replay" type="button">Replay &#9829;</button>

  <script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const message = document.getElementById("message");
  const image = new Image();
  image.src = "naobi-sam-rabbits.png";

  let startTime = 0, raf = 0, ready = false;
  const hearts = [];

  const clamp = (n, a = 0, b = 1) => Math.min(b, Math.max(a, n));
  const smooth = t => { t = clamp(t); return t * t * (3 - 2 * t); };
  // gentle ease in/out
  const easeInOut = t => { t = clamp(t); return t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; };

  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    canvas.width = innerWidth * dpr;
    canvas.height = innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // Draw the illustration. `fit` blends between a CONTAIN fit (fit=0, whole
  // image visible incl. the ear-heart, letterboxed) and a tight COVER zoom on
  // the faces (fit=1). centerFrac is the vertical point of the image kept at
  // screen-center (0 top .. 1 bottom); the faces sit ~0.62 down the image.
  function drawArt(fit, centerFrac) {
    const contain = Math.min(innerWidth / image.width, innerHeight / image.height) * 0.82;
    const cover   = Math.max(innerWidth / image.width, innerHeight / image.height) * 2.3;
    const scale = contain + (cover - contain) * fit;
    const w = image.width * scale;
    const h = image.height * scale;
    const x = (innerWidth - w) / 2;
    // keep image point (centerFrac * h) at vertical screen center
    const y = innerHeight / 2 - h * centerFrac;
    ctx.drawImage(image, x, y, w, h);
    return { x, y, w, h, scale };
  }

  function seedHearts() {
    hearts.length = 0;
    for (let i = 0; i < 26; i++) {
      hearts.push({
        x: Math.random(),
        y: Math.random(),
        size: 9 + Math.random() * 20,
        speed: .03 + Math.random() * .05,
        drift: (Math.random() - .5) * 40,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawHeart(x, y, size, alpha, rot) {
    ctx.save();
    ctx.translate(x, y); ctx.rotate(rot); ctx.scale(size/32, size/32);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#fff5f8";
    ctx.shadowColor = "rgba(255,255,255,.8)"; ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.moveTo(0, 10);
    ctx.bezierCurveTo(-25, -6, -14, -25, 0, -12);
    ctx.bezierCurveTo(14, -25, 25, -6, 0, 10);
    ctx.fill();
    ctx.restore();
  }

  // optional ?t=SECONDS to freeze the scene at a given time (for previewing)
  const FROZEN_T = (() => {
    const m = location.search.match(/[?&]t=([\d.]+)/);
    return m ? parseFloat(m[1]) : null;
  })();

  function drawScene(ms) {
    const t = FROZEN_T !== null ? FROZEN_T : (ms - startTime) / 1000;
    ctx.clearRect(0, 0, innerWidth, innerHeight);

    // ----- camera arc -----
    // 0.0–3.2s : start tight on the faces (noses meeting); the ear-heart is
    //            above the frame. Slowly pull back so the whole heart rises
    //            into view and fully completes.
    // 3.2s+    : hold on the full picture with a gentle breathing zoom.
    const reveal = easeInOut(t / 3.2);                 // 1 close-up -> 0 full view
    const fit    = 1 - reveal;                         // 1 (faces) -> 0 (contain whole)
    // When zoomed in (fit=1) center on the faces (~0.66 down the image) so the
    // ear-heart sits above the frame; when pulled back (fit=0) center slightly
    // high (0.46) so the whole heart has headroom in the contained view.
    const centerFrac = 0.46 + (0.66 - 0.46) * fit;
    const breathe = Math.sin(Math.max(0, t - 3.2) * 0.9) * 0.02 * smooth((t - 3.2) / 1.2);

    drawArt(clamp(fit - breathe, 0, 1), centerFrac);

    // ----- soft light bloom as the heart "completes" (around the reveal) -----
    const bloom = smooth((t - 1.6) / 1.6) * (1 - smooth((t - 5.5) / 2));
    if (bloom > 0) {
      const cx = innerWidth / 2, cy = innerHeight * 0.40;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(innerWidth, innerHeight) * 0.42);
      g.addColorStop(0, `rgba(255,255,255,${bloom * 0.26})`);
      g.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, innerWidth, innerHeight);
    }

    // ----- floating hearts rising once the heart has formed -----
    const heartsAlpha = smooth((t - 2.6) / 1.4);
    if (heartsAlpha > 0) {
      hearts.forEach((h, i) => {
        const travel = ((t * h.speed + h.y) % 1.12);
        const x = h.x * innerWidth + Math.sin(t * 0.8 + h.phase) * h.drift;
        const y = innerHeight * (1.1 - travel);
        const fade = Math.sin(clamp(travel) * Math.PI) * heartsAlpha * 0.75;
        drawHeart(x, y, h.size, fade, Math.sin(t + i) * 0.18);
      });
    }

    message.classList.toggle("show", t > 3.2);
    raf = requestAnimationFrame(drawScene);
  }

  function play() {
    if (!ready) return;
    cancelAnimationFrame(raf);
    message.classList.remove("show");
    seedHearts();
    startTime = performance.now();
    raf = requestAnimationFrame(drawScene);
  }

  image.onload = () => { ready = true; resize(); play(); };
  image.onerror = () => {
    ctx.fillStyle = "#fff"; ctx.font = "20px Georgia";
    ctx.textAlign = "center";
    ctx.fillText("Couldn't load the picture (naobi-sam-rabbits.png).", innerWidth/2, innerHeight/2);
  };
  window.addEventListener("resize", () => { resize(); });
  document.getElementById("replay").addEventListener("click", play);
  </script>
</body>
</html>
